<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
  <title>Kanban</title>
</head>

<body>
  <div class="kanban">
    <h1>Lista de Tarefas</h1>
  </div>
  
  <div class="kanban colunas">

    <div class="coluna">
      <div class="coluna-titulo">
        <h3 data-tarefas="0">Pendências</h3>
        <button data-add><i class="fa-solid fa-plus"></i></button>
      </div>
      <div class="lista"></div>
    </div>

    <div class="coluna">
      <div class="coluna-titulo">
        <h3 data-tarefas="0">Em andamento</h3>
        <button data-add><i class="fa-solid fa-plus"></i></button>
      </div>
      <div class="lista"></div>
    </div>

    <div class="coluna">
      <div class="coluna-titulo">
        <h3 data-tarefas="0">Concluído</h3>
        <button data-add><i class="fa-solid fa-plus"></i></button>
      </div>
      <div class="lista"></div>
    </div>
  </div>

  <!-- Criar modal -->
   <dialog>
    <form method="dialog">
        <h3>Deseja deletar tarefa?</h3>
        <p>você irá excluir a seguinte tarefa</p>
        <div class="preview"></div>
        <menu>
          <button type="button" id="cancela">Cancelar</button>
          <button type="submit" id="confirma">Sim, deletar tarefa.</button>
        </menu>
      </form>
   </dialog>
</body>

</html>
